apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langflow
  namespace: langflow

  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"

spec:
  ingressClassName: nginx

  rules:
    - host: langflow.local
      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: langflow
                port:
                  number: 80
